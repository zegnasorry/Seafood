<!DOCTYPE html>
<html lang="az" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Seafoods — Premium Fish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --bg-soft:#fbf6ee;
    --panel:#ffffff;
    --panel-2:#f7f1e6;
    --line: rgba(28,36,64,0.14);
    --line-strong: rgba(28,36,64,0.30);
    --mint:#ff6a3d;
    --mint-dim:#d94f24;
    --gold:#c2410c;
    --cream:#1b2340;
    --text:#1c2438;
    --muted:#7a7267;
    --muted-2:#a89f8f;
    --tuna1:#a53232; --tuna2:#5c1414;
    --salmon1:#f0955a; --salmon2:#c1541f;
    --white1:#7f97a0; --white2:#33454b;
    --scallop1:#e8ddc9; --scallop2:#b8a684;
    --crab1:#c94b3a; --crab2:#7a1f16;
    --caviar1:#3a2e18; --caviar2:#8a5a1e;
    --shadow: 0 20px 50px rgba(20,26,46,0.14);
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
    --hairline: linear-gradient(90deg, transparent, rgba(212,160,58,0.55) 18%, rgba(212,160,58,0.85) 50%, rgba(212,160,58,0.55) 82%, transparent);
    --ink:#12172a;
    --gold-real:#d4a03a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: #fffdf9;
    color:var(--text);
    font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    justify-content:center;
  }
  ::selection{ background:var(--mint); color:#ffffff; }

  .device{
    width:100%;
    max-width:460px;
    min-height:100vh;
    background:
      radial-gradient(140% 60% at 50% -10%, rgba(255,106,61,0.07), transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, #f5ecdc 100%);
    position:relative;
    overflow-x:hidden;
  }

  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}

  .eyebrow{
    font-size:11.5px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--mint-dim);
    font-weight:700;
  }

  [id]{ scroll-margin-top: 88px; }

  /* ---------- TOP NAV ---------- */
  .topnav{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px;
    background:linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.78) 70%, transparent);
    backdrop-filter:blur(6px);
  }
  .icon-btn{
    width:38px;height:38px;
    display:flex;align-items:center;justify-content:center;
    background:transparent; border:none; color:var(--text);
    position:relative;
  }
  .logo{
    display:flex; flex-direction:column; align-items:center; gap:5px;
    transform:translateY(1px);
  }
  .logo svg{display:none;}
  .logo .word{
    font-family:'Bodoni Moda', serif;
    font-size:20px; letter-spacing:.26em; padding-left:.26em;
    color:var(--ink); font-weight:500;
    position:relative;
  }
  .logo .word::after{
    content:''; position:absolute; left:50%; bottom:-6px; transform:translateX(-50%);
    width:34px; height:1px; background:var(--hairline);
  }
  .logo .sub{
    font-size:8px; letter-spacing:.34em; padding-left:.34em;
    color:var(--muted); font-weight:600; margin-top:2px;
  }
  .cart-badge{
    position:absolute; top:-2px; right:-4px;
    background:var(--mint); color:#ffffff;
    font-size:10px; font-weight:800;
    width:16px;height:16px; border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s;
  }
  .cart-badge.pulse{ animation:pop .35s ease; }
  @keyframes pop{ 0%{transform:scale(1);} 40%{transform:scale(1.4);} 100%{transform:scale(1);} }

  /* ---------- SIDE MENU ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(26,20,14,0.45);
    backdrop-filter:blur(2px);
    opacity:0; pointer-events:none; transition:opacity .3s;
    z-index:60;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .side-menu{
    position:fixed; top:0; left:0; bottom:0; width:78%; max-width:340px;
    background:linear-gradient(180deg, #ffffff, #f7f1e6);
    border-right:1px solid var(--line);
    transform:translateX(-105%);
    transition:transform .38s cubic-bezier(.2,.8,.2,1);
    z-index:70; padding:26px 24px; overflow-y:auto;
  }
  .side-menu.show{transform:translateX(0);}
  .side-menu .close-x{ margin-bottom:18px; }
  .lang-row{ display:flex; gap:8px; margin-bottom:26px; }
  .lang-btn{
    flex:1; padding:9px 0; text-align:center; border-radius:10px; border:1px solid var(--line-strong);
    background:transparent; color:var(--muted); font-size:11.5px; font-weight:800; letter-spacing:.06em;
  }
  .lang-btn.active{ background:var(--mint); color:#ffffff; border-color:var(--mint); }
  .side-menu nav{display:flex; flex-direction:column; gap:2px;}
  .side-menu nav a{
    padding:15px 4px; font-family:'Bodoni Moda',serif; font-size:24px;
    color:var(--cream); border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .side-menu nav a svg{width:16px;height:16px; color:var(--mint-dim);}
  .side-menu .socials{display:flex; gap:12px; margin-top:26px; padding-top:22px; border-top:1px solid var(--line);}
  .side-menu .socials a{
    width:36px;height:36px;border:1px solid var(--line-strong); border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--mint);
  }

  /* ---------- HERO ---------- */
  .brand-banner{
    position:relative;
    margin:0 0 4px; aspect-ratio: 16 / 9; height:auto;
    overflow:hidden;
  }
  .brand-banner .banner-media{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    animation: kenburns 16s ease-in-out infinite alternate;
  }
  @keyframes kenburns{
    0%{ transform:scale(1.0) translate(0,0); }
    100%{ transform:scale(1.06) translate(-1%, -1%); }
  }
  .brand-banner .banner-overlay{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(24,20,14,0.05) 0%, rgba(18,14,10,0.06) 55%, rgba(12,10,8,0.50) 100%),
      linear-gradient(180deg, rgba(20,26,46,0.08), transparent 30%);
  }
  .brand-banner .banner-caption{
    position:absolute; left:20px; right:20px; bottom:14px; color:#fffdf9;
  }
  .brand-banner .banner-caption .eyebrow{ color:#f2d9c4; font-size:10px; }
  .brand-banner .banner-caption .bc-title{
    font-family:'Bodoni Moda', serif; font-weight:500; font-size:22px; line-height:1.05;
    margin:8px 0 0; letter-spacing:.01em;
  }
  .brand-banner .banner-rule{
    width:40px; height:1px; background:var(--hairline); margin:14px 0 0;
    filter:brightness(1.6);
  }
  .hero{ position:relative; padding:6px 20px 22px; }
  .hero-slide{ display:none; animation:fade .5s ease; }
  .hero-slide.active{ display:block; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .hero h1{
    font-family:'Bodoni Moda', serif;
    font-weight:600;
    font-size:44px; line-height:.98; letter-spacing:.01em;
    margin:10px 0 12px;
    color:var(--cream);
  }
  .hero h1 .accent{ color:var(--mint); display:block; }
  .hero p{
    color:var(--muted); font-size:14.5px; line-height:1.55; max-width:78%;
    margin:0 0 20px;
  }
  .hero-art{
    position:relative; height:180px; border-radius:var(--radius-lg);
    margin:14px 0 20px; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    box-shadow: var(--shadow);
    border:1px solid var(--line);
  }
  .hero-art .plate{
    position:absolute; inset:0;
    background:
      radial-gradient(120% 140% at 75% 20%, rgba(255,106,61,0.10), transparent 55%),
      linear-gradient(140deg, #f5ecdc, #ffffff 65%);
  }
  .hero-art .ice{
    position:absolute; inset:0; opacity:.45; mix-blend-mode:multiply;
    background-image: radial-gradient(circle at 18% 30%, rgba(28,36,64,.16) 0 2px, transparent 3px),
                       radial-gradient(circle at 40% 70%, rgba(28,36,64,.12) 0 3px, transparent 4px),
                       radial-gradient(circle at 65% 25%, rgba(28,36,64,.14) 0 2px, transparent 3px),
                       radial-gradient(circle at 85% 60%, rgba(28,36,64,.10) 0 2px, transparent 3px),
                       radial-gradient(circle at 25% 80%, rgba(28,36,64,.12) 0 2px, transparent 3px),
                       radial-gradient(circle at 55% 45%, rgba(28,36,64,.10) 0 2px, transparent 3px);
  }
  .fillet{
    position:relative; width:66%; height:62%; border-radius:38% 62% 55% 45%/48% 42% 58% 52%;
    box-shadow: inset 0 0 30px rgba(0,0,0,.2), 0 12px 30px rgba(20,26,46,.2);
  }
  .fillet::after{
    content:''; position:absolute; inset:0; border-radius:inherit;
    background-image: repeating-linear-gradient(115deg, rgba(255,255,255,.08) 0 2px, transparent 2px 9px);
    opacity:.5;
  }
  /* real product photos: clean framed look instead of the organic placeholder shape */
  img.fillet-photo{
    width:100%; height:100%; object-fit:cover; border-radius:var(--radius-sm);
    box-shadow: inset 0 0 0 1px rgba(20,26,46,0.06), 0 10px 24px rgba(20,26,46,.16);
    display:block;
  }
  .cat-circle img.fillet-photo{ width:100%; height:100%; border-radius:50%; box-shadow:none; }
  .card-media img.fillet-photo{ width:100%; height:100%; border-radius:0; }
  .d-item img.fillet-photo{ width:52px; height:52px; flex-shrink:0; border-radius:var(--radius-sm); }
  .cta-outline{
    display:inline-flex; align-items:center; gap:10px;
    border:1px solid var(--mint); border-radius:30px;
    padding:14px 22px; font-size:12.5px; letter-spacing:.16em; text-transform:uppercase;
    font-weight:700; color:var(--mint-dim); background:transparent;
    transition:background .2s, border-color .2s, color .2s;
  }
  .cta-outline svg{width:14px;height:14px;color:var(--mint);}
  .cta-outline:active{ background:rgba(255,106,61,0.08); border-color:var(--mint); }

  .dots{ display:flex; justify-content:center; gap:7px; margin-top:8px; }
  .dot{ width:18px; height:3px; border-radius:2px; background:var(--line-strong); border:none; padding:0; transition:.3s; }
  .dot.active{ background:var(--mint); width:26px; }

  /* ---------- SECTION HEADER ---------- */
  .section{ padding:34px 20px 0; }
  .section-head{
    display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px;
  }
  .section-head h2{
    font-family:'Bodoni Moda', serif; font-weight:500; font-size:27px;
    letter-spacing:.01em; color:var(--cream); margin:0; position:relative; padding-bottom:12px;
  }
  .section-head h2::after{
    content:''; position:absolute; left:0; bottom:0; width:36px; height:1px;
    background:var(--hairline); filter:saturate(1.4);
  }
  .see-all{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:700;
    color:var(--mint-dim); display:flex; align-items:center; gap:6px; background:none; border:none;
  }
  .see-all svg{width:12px;height:12px;}

  /* ---------- CATEGORIES ---------- */
  .cat-row{
    display:flex; gap:20px; overflow-x:auto; padding:4px 20px 10px; margin:0 -20px;
    scrollbar-width:none;
  }
  .cat-row::-webkit-scrollbar{display:none;}
  .cat-item{
    display:flex; flex-direction:column; align-items:center; gap:10px; flex-shrink:0;
    background:none; border:none; color:var(--text);
  }
  .cat-circle{
    width:60px; height:60px; border-radius:50%; border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    position:relative; transition:border-color .25s, box-shadow .25s;
    background:#ffffff;
  }
  .cat-item.active .cat-circle{ border-color:var(--gold-real, #d4a03a); box-shadow:0 0 0 1px var(--gold-real, #d4a03a); }
  .cat-circle svg{ width:24px; height:24px; color:var(--mint-dim); }
  .cat-item.active .cat-circle svg{ color:var(--ink); }
  .cat-item span{ font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .cat-item.active span{ color:var(--ink); font-weight:700; }

  /* ---------- PRODUCT GRID ---------- */
  .grid{
    display:grid; grid-template-columns:1fr 1fr; gap:14px; padding-top:4px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line); border-radius:2px;
    overflow:hidden; display:flex; flex-direction:column;
    animation:fade .4s ease;
    transition:border-color .2s, box-shadow .2s;
  }
  .card:active{ border-color:var(--line-strong); }
  .card-media{
    position:relative; height:132px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(180deg, #fdfaf3, #f6efe1);
    border-bottom:1px solid var(--line);
  }
  .card-media img.fillet-photo{ filter:saturate(.94); }
  .media-plate{
    position:relative; width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
  }
  .media-plate::before{
    content:''; position:absolute; width:52px; height:52px; border-radius:50%;
    border:1px solid rgba(28,36,64,0.16);
  }
  .media-plate svg{ position:relative; width:26px; height:26px; color:var(--mint-dim); opacity:.9; }
  .cat-circle .media-plate::before{ display:none; }
  .fav-btn{
    position:absolute; top:9px; right:9px; width:26px; height:26px; border-radius:50%;
    background:rgba(255,255,255,0.85); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:var(--text);
  }
  .fav-btn svg{width:13px;height:13px; transition:.2s;}
  .fav-btn.active svg{ color:#8a3b46; fill:#8a3b46; }
  .card.out-of-stock .card-media{ filter:grayscale(.55) brightness(.92); }
  .card.out-of-stock .card-name, .card.out-of-stock .card-price{ opacity:.5; }
  .stock-badge{
    position:absolute; left:9px; top:9px; z-index:2;
    background:rgba(24,20,14,0.82); color:#fff;
    font-size:9px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
    padding:5px 9px; border-radius:20px;
  }
  .out-btn{
    height:30px; padding:0 10px; border-radius:20px; border:1px solid var(--line-strong);
    background:transparent; color:var(--muted); font-size:9.5px; font-weight:700;
    letter-spacing:.03em; text-transform:uppercase; flex-shrink:0; white-space:nowrap;
  }
  .card-body{ padding:16px 14px 16px; display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; text-align:center; }
  .card-tag{
    font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--mint-dim); font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
  }
  .card-name{
    font-family:'Bodoni Moda',serif; font-size:16.5px; color:var(--ink); font-weight:500; line-height:1.28;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    min-height:calc(1.28em * 2); letter-spacing:.01em;
  }
  .card-name::after{
    content:''; display:block; width:22px; height:1px; margin:8px auto 0;
    background:var(--gold-real, #d4a03a); opacity:.6;
  }
  .card-bottom{
    margin-top:auto; padding-top:12px; margin-top:10px; border-top:1px solid var(--line);
    width:100%; display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .card-price{ font-family:'Bodoni Moda',serif; font-size:14.5px; font-weight:600; color:var(--text); white-space:nowrap; letter-spacing:.02em; }
  .card-price span{ font-family:'Manrope',sans-serif; color:var(--muted); font-weight:500; font-size:10.5px; white-space:nowrap; }
  .add-btn{
    width:34px; height:34px; border-radius:50%; border:none;
    background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:background .2s, transform .15s;
    box-shadow:0 3px 10px rgba(26,20,14,0.22);
  }
  .add-btn:active{ transform:scale(.92); background:var(--gold-real, #d4a03a); }
  .add-btn svg{ width:16px;height:16px; stroke-width:1.4; }
  .qty-stepper{
    display:flex; align-items:center; gap:10px; background:var(--ink);
    border:none; border-radius:20px; padding:5px 8px;
    box-shadow:0 3px 10px rgba(26,20,14,0.22);
  }
  .qty-stepper button{ width:22px;height:22px; border:none; background:none; color:#fff; display:flex; align-items:center; justify-content:center; }
  .qty-stepper button svg{ width:14px;height:14px; stroke-width:1.4; }
  .qty-stepper button:active svg{ color:var(--gold-real, #d4a03a); }
  .qty-stepper .qn{ font-size:12.5px; font-weight:700; min-width:14px; text-align:center; color:#fff; }

  /* ---------- FEATURES ---------- */
  .feature-panel{
    margin:34px 20px 0; border:1px solid var(--line); border-radius:var(--radius-lg);
    background:linear-gradient(180deg, rgba(255,106,61,0.04), transparent);
    overflow:hidden;
  }
  .feature{
    display:flex; gap:14px; align-items:center; padding:18px 18px;
    border-bottom:1px solid var(--line); cursor:pointer;
  }
  .feature:last-child{ border-bottom:none; }
  .feature-icon{
    width:36px;height:36px; border-radius:50%; border:1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center; color:var(--mint); flex-shrink:0;
  }
  .feature-icon svg{ width:17px;height:17px; }
  .feature-text{ flex:1; }
  .feature-text .ft-title{ font-size:12px; letter-spacing:.1em; text-transform:uppercase; font-weight:800; color:var(--gold); margin-bottom:5px; }
  .feature-text .ft-desc{ font-size:13px; color:var(--muted); line-height:1.5; max-height:0; overflow:hidden; transition:max-height .3s ease, opacity .3s; opacity:0; }
  .feature.open .ft-desc{ max-height:90px; opacity:1; margin-top:4px; }
  .feature-chev{ width:14px;height:14px; color:var(--muted-2); transition:transform .3s; flex-shrink:0; }
  .feature.open .feature-chev{ transform:rotate(90deg); color:var(--mint); }

  /* ---------- FOOTER ---------- */
  footer{ margin-top:44px; padding:30px 20px 110px; border-top:1px solid var(--line); }
  footer .f-logo{ font-family:'Bodoni Moda',serif; font-size:20px; letter-spacing:.22em; padding-left:.22em; color:var(--mint-dim); margin-bottom:6px; }
  footer .f-tag{ font-size:12px; color:var(--muted); margin-bottom:22px; }
  footer .f-socials{ display:flex; gap:12px; margin-top:6px; }
  footer .f-socials a{
    width:40px;height:40px; border-radius:50%; border:1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center; color:var(--mint);
  }
  footer .f-socials svg{ width:18px;height:18px; }
  footer .copyright{ margin-top:26px; font-size:10.5px; color:var(--muted-2); letter-spacing:.05em; }

  /* ---------- STICKY CART BAR ---------- */
  .cart-bar{
    position:fixed; left:50%; transform:translateX(-50%) translateY(140%);
    bottom:16px; width:calc(100% - 40px); max-width:420px;
    background:linear-gradient(120deg, #ffffff, #f7f1e6);
    border:1px solid var(--mint-dim); border-radius:18px;
    padding:13px 16px; display:flex; align-items:center; justify-content:space-between;
    box-shadow:var(--shadow); z-index:50; transition:transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .cart-bar.show{ transform:translateX(-50%) translateY(0); }
  .cart-bar .cb-left{ display:flex; align-items:center; gap:10px; font-size:13px; }
  .cart-bar .cb-count{
    width:24px;height:24px;border-radius:50%; background:var(--mint); color:#ffffff;
    font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;
  }
  .cart-bar .cb-sum{ font-weight:800; color:var(--cream); }
  .cart-bar .cb-btn{
    background:var(--mint); color:#ffffff; border:none; border-radius:30px;
    padding:10px 18px; font-size:11.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
    display:flex; align-items:center; gap:6px;
  }
  .cart-bar .cb-btn svg{ width:12px;height:12px; }

  /* ---------- CART DRAWER ---------- */
  .drawer{
    position:fixed; left:0; right:0; bottom:0; z-index:80;
    background:linear-gradient(180deg, #ffffff, #fbf6ee);
    border-top:1px solid var(--line-strong);
    border-radius:24px 24px 0 0;
    max-width:460px; margin:0 auto;
    transform:translateY(100%); transition:transform .4s cubic-bezier(.2,.8,.2,1);
    max-height:88vh; display:flex; flex-direction:column;
    box-shadow:0 -20px 50px rgba(20,26,46,0.14);
    overflow-y:auto; -webkit-overflow-scrolling:touch;
  }
  .drawer.show{ transform:translateY(0); }
  .drawer-handle{ width:36px;height:4px; background:var(--line-strong); border-radius:3px; margin:12px auto 6px; flex-shrink:0; }

    visible.forEach(p => grid.appendChild(renderCard(p)));
    seeAllBtn.style.display = list.length > VISIBLE_LIMIT ? 'flex' : 'none';
    seeAllBtn.innerHTML = (showAll ? t('sections.hide') : t('sections.seeAll')) +
      ' <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  function renderCard(p){
    const info = t('products.' + p.id);
    const inStock = p.inStock !== false;
    const card = document.createElement('div');
    card.className = 'card' + (inStock ? '' : ' out-of-stock');
    const qty = cart[p.id] || 0;
    card.innerHTML = `
      <div class="card-media">
        <button class="fav-btn ${favs.has(p.id) ? 'active' : ''}" data-fav="${p.id}">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 20s-7-4.4-9.3-8.8C1.2 8 2.6 4.8 5.7 4.1 8 3.6 10 4.7 12 7c2-2.3 4-3.4 6.3-2.9 3.1.7 4.5 3.9 3 7.1C19 15.6 12 20 12 20Z" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        ${inStock ? '' : `<div class="stock-badge">${t('outOfStock')}</div>`}
        ${mediaHtml(p)}
      </div>
      <div class="card-body">
        <div class="card-tag">${t('categories.' + p.cat)}</div>
        <div class="card-name">${info.name}</div>
        <div class="card-bottom">
          <div class="card-price">${fmtPrice(p.price)} <span>/ ${unitLabel(p.unit)}</span></div>
          <div class="stepper-slot" data-slot="${p.id}"></div>
        </div>
      </div>
    `;
    if (inStock){
      renderStepper(card.querySelector(`[data-slot="${p.id}"]`), p, qty);
    } else {
      card.querySelector(`[data-slot="${p.id}"]`).innerHTML = `<button class="out-btn" disabled>${t('outOfStock')}</button>`;
    }
    card.querySelector(`[data-fav="${p.id}"]`).addEventListener('click', (e) => {
      e.stopPropagation();
      if (favs.has(p.id)) favs.delete(p.id); else favs.add(p.id);
      card.querySelector(`[data-fav="${p.id}"]`).classList.toggle('active');
    });
    card.addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      openProductModal(p);
    });
    return card;
  }

  function renderStepper(slot, p, qty){
    if (qty <= 0){
      slot.innerHTML = `<button class="add-btn" data-add="${p.id}"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>`;
      slot.querySelector('[data-add]').addEventListener('click', () => changeQty(p, 1, slot));
    } else {
      slot.innerHTML = `
        <div class="qty-stepper">
          <button data-dec><svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
          <span class="qn">${qty}</span>
          <button data-inc><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
        </div>`;
      slot.querySelector('[data-inc]').addEventListener('click', () => changeQty(p, 1, slot));
      slot.querySelector('[data-dec]').addEventListener('click', () => changeQty(p, -1, slot));
    }
  }

  function changeQty(p, delta, slot){
    const cur = cart[p.id] || 0;
    const next = Math.max(0, cur + delta);
    if (next === 0) delete cart[p.id]; else cart[p.id] = next;
    renderStepper(slot, p, next);
    updateCartUI();
    if (delta > 0) showToast(t('toast').added(t('products.' + p.id).name));
    pulseBadge();
  }

  // ---------------- PRODUCT DETAIL MODAL ----------------
  const pmOverlay = $('#pmOverlay');
  const productModal = $('#productModal');
  const pmMedia = $('#pmMedia');
  const pmTag = $('#pmTag');
  const pmName = $('#pmName');
  const pmPrice = $('#pmPrice');
  const pmDesc = $('#pmDesc');
  const pmQtyLabel = $('#pmQtyLabel');
  const pmQtyInput = $('#pmQtyInput');
  const pmSlider = $('#pmSlider');
  const pmDec = $('#pmDec');
  const pmInc = $('#pmInc');
  const pmAddBtn = $('#pmAddBtn');
  const pmAddLabel = $('#pmAddLabel');
  const pmAddTotal = $('#pmAddTotal');
  const pmCloseBtn = $('#pmCloseBtn');

  let pmProduct = null;
  const PM_MAX_QTY = 30;

  function openProductModal(p){
    pmProduct = p;
    const info = t('products.' + p.id);
    const inStock = p.inStock !== false;

    pmMedia.innerHTML = (inStock ? '' : `<div class="pm-stock-badge">${t('outOfStock')}</div>`) + mediaHtml(p, 'pm-photo');
    pmTag.textContent = t('categories.' + p.cat);
    pmName.textContent = info.name;
    pmPrice.innerHTML = `${fmtPrice(p.price)} <span>/ ${unitLabel(p.unit)}</span>`;
    pmDesc.textContent = info.desc || '';
    pmDesc.style.display = info.desc ? 'block' : 'none';
    pmQtyLabel.textContent = t('pm').qty;
    pmAddLabel.textContent = t('pm').add;

    const startQty = Math.max(1, cart[p.id] || 1);
    pmSlider.max = PM_MAX_QTY;
    setPmQty(startQty);

    pmAddBtn.disabled = !inStock;
    pmAddBtn.style.opacity = inStock ? '1' : '.55';

    productModal.classList.add('show');
    pmOverlay.classList.add('show');
  }

  function closeProductModal(){
    productModal.classList.remove('show');
    pmOverlay.classList.remove('show');
    pmProduct = null;
  }

  function setPmQty(qty){
    qty = Math.max(1, Math.min(PM_MAX_QTY, Math.round(qty) || 1));
    pmQtyInput.value = qty;
    pmSlider.value = qty;
    pmAddTotal.textContent = pmProduct ? fmtPrice(pmProduct.price * qty) : '';
  }

  pmSlider.addEventListener('input', () => setPmQty(Number(pmSlider.value)));
  pmQtyInput.addEventListener('input', () => setPmQty(Number(pmQtyInput.value)));
  pmDec.addEventListener('click', () => setPmQty(Number(pmQtyInput.value) - 1));
  pmInc.addEventListener('click', () => setPmQty(Number(pmQtyInput.value) + 1));

  pmCloseBtn.addEventListener('click', closeProductModal);
  pmOverlay.addEventListener('click', closeProductModal);

  pmAddBtn.addEventListener('click', () => {
    if (!pmProduct || pmProduct.inStock === false) return;
    const qty = Math.max(1, Math.min(PM_MAX_QTY, Number(pmQtyInput.value) || 1));
    const cur = cart[pmProduct.id] || 0;
    cart[pmProduct.id] = cur + qty;
    updateCartUI();
    renderGrid();
    pulseBadge();
    showToast(t('toast').added(t('products.' + pmProduct.id).name));
    closeProductModal();
  });

  // ---------------- (слайдер hero удалён вместе с разметкой) ----------------

  // ---------------- SIDE MENU ----------------
  const overlay = $('#overlay');
  const sideMenu = $('#sideMenu');
  function openMenu(){ sideMenu.classList.add('show'); overlay.classList.add('show'); }
  function closeMenu(){ sideMenu.classList.remove('show'); overlay.classList.remove('show'); }
  $('#menuBtn').addEventListener('click', openMenu);
  $('#closeMenuBtn').addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);

  $$('.menu-link').forEach(a => a.addEventListener('click', (e) => {
    e.preventDefault();
    const targetId = a.dataset.target;
    closeMenu();
    setTimeout(() => {
      const el = document.getElementById(targetId);
      if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 320);
  }));

  // ---------------- FEATURES ACCORDION ----------------
  $$('.feature').forEach(f => {
    f.addEventListener('click', () => {
      const wasOpen = f.classList.contains('open');
      $$('.feature').forEach(el => el.classList.remove('open'));
      if (!wasOpen) f.classList.add('open');
    });
  });

  // ---------------- CART / DRAWER ----------------
  const cartBar = $('#cartBar');
  const cartBadge = $('#cartBadge');
  const cbCount = $('#cbCount');
  const cbSum = $('#cbSum');
  const drawer = $('#drawer');
  const drawerOverlay = $('#drawerOverlay');
  const drawerItems = $('#drawerItems');
  const drawerTotal = $('#drawerTotal');

  function cartEntries(){
    return Object.entries(cart).map(([id, qty]) => ({p: PRODUCTS.find(pp => pp.id === id), qty}));
  }
  function cartTotal(){
    return cartEntries().reduce((sum, e) => sum + e.p.price * e.qty, 0);
  }
  function cartCount(){
    return Object.values(cart).reduce((a,b) => a+b, 0);
  }

  function updateCartUI(){
    const count = cartCount();
    const total = cartTotal();
    cartBadge.textContent = count;
    cbCount.textContent = count;
    cbSum.textContent = fmtPrice(total);
    drawerTotal.textContent = fmtPrice(total);
    cartBar.classList.toggle('show', count > 0);
    renderDrawerItems();
  }

  function renderDrawerItems(){
    const entries = cartEntries();
    if (entries.length === 0){
      drawerItems.innerHTML = `<div class="drawer-empty">${t('cart.empty')}</div>`;
      return;
    }
    drawerItems.innerHTML = '';
    entries.forEach(({p, qty}) => {
      const info = t('products.' + p.id);
      const row = document.createElement('div');
      row.className = 'd-item';
      row.innerHTML = `
        ${mediaHtml(p)}
        <div class="d-item-info">
          <div class="n">${info.name}</div>
          <div class="p">${qty} × ${fmtPrice(p.price)} / ${unitLabel(p.unit)}</div>
        </div>
        <button class="remove" data-remove="${p.id}"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
      `;
      row.querySelector('[data-remove]').addEventListener('click', () => {
        delete cart[p.id];
        updateCartUI();
        renderGrid();
      });
      drawerItems.appendChild(row);
    });
  }

  function pulseBadge(){
    cartBadge.classList.remove('pulse');
    void cartBadge.offsetWidth;
    cartBadge.classList.add('pulse');
  }

  function openDrawer(){ drawer.classList.add('show'); drawerOverlay.classList.add('show'); }
  function closeDrawer(){ drawer.classList.remove('show'); drawerOverlay.classList.remove('show'); }
  $('#cartBtn').addEventListener('click', openDrawer);
  $('#openDrawerBtn').addEventListener('click', openDrawer);
  $('#closeDrawerBtn').addEventListener('click', closeDrawer);
  drawerOverlay.addEventListener('click', closeDrawer);
  const ofTypeOnce = $('#ofTypeOnce');
  const ofTypeRegular = $('#ofTypeRegular');
  ofTypeOnce.addEventListener('click', () => {
    orderType = 'once';
    ofTypeOnce.classList.add('active');
    ofTypeRegular.classList.remove('active');
  });
  ofTypeRegular.addEventListener('click', () => {
    orderType = 'regular';
    ofTypeRegular.classList.add('active');
    ofTypeOnce.classList.remove('active');
  });

  const ofError = $('#ofError');

  function dlog(){}
  const checkoutBtn = $('#checkoutBtn');

  function escapeHtml(str){
    return String(str).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  function buildOrderMessage(fields){
    const lines = [];
    lines.push('🐟 <b>Yeni sifariş / Новый заказ</b>');
    lines.push('');
    lines.push(`<b>Müəssisə/Заведение:</b> ${escapeHtml(fields.business)}`);
    lines.push(`<b>Əlaqə/Контакт:</b> ${escapeHtml(fields.contact)}`);
    lines.push(`<b>Telefon/Телефон:</b> ${escapeHtml(fields.phone)}`);
    lines.push(`<b>Ünvan/Адрес:</b> ${escapeHtml(fields.address)}`);
    lines.push(`<b>Növ/Тип:</b> ${orderType === 'regular' ? (t('orderForm').regular) : (t('orderForm').once)}`);
    if (fields.comment) lines.push(`<b>Şərh/Комментарий:</b> ${escapeHtml(fields.comment)}`);
    lines.push('');
    lines.push('<b>Sifariş/Заказ:</b>');
    cartEntries().forEach(({p, qty}) => {
      const info = t('products.' + p.id);
      lines.push(`• ${escapeHtml(info.name)} — ${qty} × ${fmtPrice(p.price)}`);
    });
    lines.push('');
    lines.push(`<b>Cəmi/Итого:</b> ${fmtPrice(cartTotal())}`);
    return lines.join('\n');
  }

  async function sendOrderToTelegram(text){
    const params = new URLSearchParams();
    params.set('chat_id', TG_CHAT_ID);
    params.set('text', text);
    params.set('parse_mode', 'HTML');
    const url = `https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage?${params.toString()}`;
    dlog('fetch начат...');
    const res = await fetch(url);
    dlog('fetch завершён, статус: ' + res.status);
    const data = await res.json();
    dlog('ответ Telegram: ' + JSON.stringify(data).slice(0, 150));
    if (!data.ok) throw new Error(data.description || 'Telegram error');
    return data;
  }

  checkoutBtn.addEventListener('click', async () => {
    dlog('клик получен, товаров в корзине: ' + cartCount());
    if (cartCount() === 0) return;
    ofError.classList.remove('show');

    let fields;
    try {
      fields = {
        business: $('#ofBusiness').value.trim(),
        contact: $('#ofContact').value.trim(),
        phone: $('#ofPhone').value.trim(),
        address: $('#ofAddress').value.trim(),
        comment: $('#ofComment').value.trim()
      };
    } catch (e) {
      dlog('ошибка чтения полей формы: ' + e.message);
      return;
    }

    if (!fields.business || !fields.contact || !fields.phone || !fields.address){
      dlog('не все обязательные поля заполнены');
      ofError.textContent = t('orderForm').errRequired;
      ofError.classList.add('show');
      return;
    }

    dlog('поля ок, отправляю запрос в Telegram...');

    const originalLabel = checkoutBtn.textContent;
    checkoutBtn.disabled = true;
    checkoutBtn.textContent = t('orderForm').sending;

    try {
      await sendOrderToTelegram(buildOrderMessage(fields));
      dlog('сообщение успешно отправлено!');
      showToast(t('toast').orderPlaced);
      Object.keys(cart).forEach(k => delete cart[k]);
      ['ofBusiness','ofContact','ofPhone','ofAddress','ofComment'].forEach(id => $('#'+id).value = '');
      orderType = 'once';
      ofTypeOnce.classList.add('active');
      ofTypeRegular.classList.remove('active');
      updateCartUI();
      renderGrid();
      closeDrawer();
    } catch (err){
      dlog('ошибка отправки: ' + err.message);
      console.error('Telegram send failed:', err);
      ofError.textContent = t('orderForm').sendError;
      ofError.classList.add('show');
    } finally {
      checkoutBtn.disabled = false;
      checkoutBtn.textContent = originalLabel;
    }
  });

  // ---------------- SEE ALL ----------------
  seeAllBtn.addEventListener('click', () => { showAll = !showAll; renderGrid(); });

  // ---------------- TOAST ----------------
  let toastTimer;
  function showToast(msg){
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ---------------- INIT ----------------
  applyStaticText();
  renderCategories();
  renderGrid();
  updateCartUI();
})();
</script>
</body>
</html>
