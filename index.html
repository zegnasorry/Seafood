<!DOCTYPE html>
<html lang="az" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Seafoods — Premium Fish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050f0d;
    --bg-soft:#0a1c18;
    --panel:#0d211c;
    --panel-2:#0f2620;
    --line: rgba(150,205,188,0.14);
    --line-strong: rgba(150,205,188,0.28);
    --mint:#8beeda;
    --mint-dim:#4f9c8c;
    --gold:#d7b57a;
    --cream:#f2ead9;
    --text:#e9f4f0;
    --muted:#82a49b;
    --muted-2:#5c766f;
    --tuna1:#a53232; --tuna2:#5c1414;
    --salmon1:#f0955a; --salmon2:#c1541f;
    --white1:#7f97a0; --white2:#33454b;
    --scallop1:#e8ddc9; --scallop2:#b8a684;
    --crab1:#c94b3a; --crab2:#7a1f16;
    --caviar1:#3a2e18; --caviar2:#8a5a1e;
    --shadow: 0 20px 50px rgba(0,0,0,0.45);
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: #01100c;
    color:var(--text);
    font-family:'Manrope',sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    justify-content:center;
  }
  ::selection{ background:var(--mint); color:#04120e; }

  .device{
    width:100%;
    max-width:460px;
    min-height:100vh;
    background:
      radial-gradient(140% 60% at 50% -10%, rgba(79,156,140,0.16), transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, #030b09 100%);
    position:relative;
    overflow-x:hidden;
  }

  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer;}

  .eyebrow{
    font-size:11.5px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--mint-dim);
    font-weight:700;
  }

  [id]{ scroll-margin-top: 88px; }

  /* ---------- TOP NAV ---------- */
  .topnav{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 20px;
    background:linear-gradient(180deg, rgba(3,11,9,0.92), rgba(3,11,9,0.75) 70%, transparent);
    backdrop-filter:blur(6px);
  }
  .icon-btn{
    width:38px;height:38px;
    display:flex;align-items:center;justify-content:center;
    background:transparent; border:none; color:var(--text);
    position:relative;
  }
  .logo{
    display:flex; flex-direction:column; align-items:center; gap:2px;
    transform:translateY(1px);
  }
  .logo svg{width:76px; height:16px; color:var(--mint); opacity:.9;}
  .logo .word{
    font-family:'Cormorant Garamond', serif;
    font-size:19px; letter-spacing:.2em; padding-left:.2em;
    color:var(--cream); font-weight:600;
  }
  .logo .sub{
    font-size:8px; letter-spacing:.32em; padding-left:.32em;
    color:var(--muted); font-weight:600;
  }
  .cart-badge{
    position:absolute; top:-2px; right:-4px;
    background:var(--mint); color:#04120e;
    font-size:10px; font-weight:800;
    width:16px;height:16px; border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s;
  }
  .cart-badge.pulse{ animation:pop .35s ease; }
  @keyframes pop{ 0%{transform:scale(1);} 40%{transform:scale(1.4);} 100%{transform:scale(1);} }

  /* ---------- SIDE MENU ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(2,8,7,0.6);
    backdrop-filter:blur(2px);
    opacity:0; pointer-events:none; transition:opacity .3s;
    z-index:60;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .side-menu{
    position:fixed; top:0; left:0; bottom:0; width:78%; max-width:340px;
    background:linear-gradient(180deg, #0a2019, #05130f);
    border-right:1px solid var(--line);
    transform:translateX(-105%);
    transition:transform .38s cubic-bezier(.2,.8,.2,1);
    z-index:70; padding:26px 24px; overflow-y:auto;
  }
  .side-menu.show{transform:translateX(0);}
  .side-menu .close-x{ margin-bottom:18px; }
  .lang-row{ display:flex; gap:8px; margin-bottom:26px; }
  .lang-btn{
    flex:1; padding:9px 0; text-align:center; border-radius:10px; border:1px solid var(--line-strong);
    background:transparent; color:var(--muted); font-size:11.5px; font-weight:800; letter-spacing:.06em;
  }
  .lang-btn.active{ background:var(--mint); color:#04120e; border-color:var(--mint); }
  .side-menu nav{display:flex; flex-direction:column; gap:2px;}
  .side-menu nav a{
    padding:15px 4px; font-family:'Cormorant Garamond',serif; font-size:24px;
    color:var(--cream); border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .side-menu nav a svg{width:16px;height:16px; color:var(--mint-dim);}
  .side-menu .socials{display:flex; gap:12px; margin-top:26px; padding-top:22px; border-top:1px solid var(--line);}
  .side-menu .socials a{
    width:36px;height:36px;border:1px solid var(--line-strong); border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--mint);
  }

  /* ---------- HERO ---------- */
  .hero{ position:relative; padding:6px 20px 22px; }
  .hero-slide{ display:none; animation:fade .5s ease; }
  .hero-slide.active{ display:block; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .hero h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:44px; line-height:.98; letter-spacing:.01em;
    margin:10px 0 12px;
    color:var(--cream);
  }
  .hero h1 .accent{ color:var(--mint); display:block; }
  .hero p{
    color:var(--muted); font-size:14.5px; line-height:1.55; max-width:78%;
    margin:0 0 20px;
  }
  .hero-art{
    position:relative; height:180px; border-radius:var(--radius-lg);
    margin:14px 0 20px; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    box-shadow: var(--shadow);
  }
  .hero-art .plate{
    position:absolute; inset:0;
    background:
      radial-gradient(120% 140% at 75% 20%, rgba(139,238,218,0.10), transparent 55%),
      linear-gradient(140deg, #0c221c, #051310 65%);
  }
  .hero-art .ice{
    position:absolute; inset:0; opacity:.5; mix-blend-mode:screen;
    background-image: radial-gradient(circle at 18% 30%, rgba(255,255,255,.35) 0 2px, transparent 3px),
                       radial-gradient(circle at 40% 70%, rgba(255,255,255,.25) 0 3px, transparent 4px),
                       radial-gradient(circle at 65% 25%, rgba(255,255,255,.3) 0 2px, transparent 3px),
                       radial-gradient(circle at 85% 60%, rgba(255,255,255,.22) 0 2px, transparent 3px),
                       radial-gradient(circle at 25% 80%, rgba(255,255,255,.28) 0 2px, transparent 3px),
                       radial-gradient(circle at 55% 45%, rgba(255,255,255,.2) 0 2px, transparent 3px);
  }
  .fillet{
    position:relative; width:66%; height:62%; border-radius:38% 62% 55% 45%/48% 42% 58% 52%;
    box-shadow: inset 0 0 30px rgba(0,0,0,.35), 0 12px 30px rgba(0,0,0,.4);
  }
  .fillet::after{
    content:''; position:absolute; inset:0; border-radius:inherit;
    background-image: repeating-linear-gradient(115deg, rgba(255,255,255,.08) 0 2px, transparent 2px 9px);
    opacity:.5;
  }
  .cta-outline{
    display:inline-flex; align-items:center; gap:10px;
    border:1px solid var(--line-strong); border-radius:30px;
    padding:14px 22px; font-size:12.5px; letter-spacing:.16em; text-transform:uppercase;
    font-weight:700; color:var(--cream); background:transparent;
    transition:background .2s, border-color .2s;
  }
  .cta-outline svg{width:14px;height:14px;color:var(--mint);}
  .cta-outline:active{ background:rgba(139,238,218,0.08); border-color:var(--mint); }

  .dots{ display:flex; justify-content:center; gap:7px; margin-top:8px; }
  .dot{ width:18px; height:3px; border-radius:2px; background:var(--line-strong); border:none; padding:0; transition:.3s; }
  .dot.active{ background:var(--mint); width:26px; }

  /* ---------- SECTION HEADER ---------- */
  .section{ padding:34px 20px 0; }
  .section-head{
    display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px;
  }
  .section-head h2{
    font-family:'Cormorant Garamond', serif; font-weight:600; font-size:26px;
    letter-spacing:.02em; color:var(--cream); margin:0;
  }
  .see-all{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:700;
    color:var(--mint); display:flex; align-items:center; gap:6px; background:none; border:none;
  }
  .see-all svg{width:12px;height:12px;}

  /* ---------- CATEGORIES ---------- */
  .cat-row{
    display:flex; gap:18px; overflow-x:auto; padding:4px 20px 10px; margin:0 -20px;
    scrollbar-width:none;
  }
  .cat-row::-webkit-scrollbar{display:none;}
  .cat-item{
    display:flex; flex-direction:column; align-items:center; gap:9px; flex-shrink:0;
    background:none; border:none; color:var(--text);
  }
  .cat-circle{
    width:64px; height:64px; border-radius:50%; border:1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden; transition:border-color .25s, box-shadow .25s;
  }
  .cat-item.active .cat-circle{ border-color:var(--mint); box-shadow:0 0 0 3px rgba(139,238,218,0.1); }
  .cat-circle .fillet{ width:76%; height:76%; box-shadow:none; }
  .cat-item span{ font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:700; }
  .cat-item.active span{ color:var(--mint); }

  /* ---------- PRODUCT GRID ---------- */
  .grid{
    display:grid; grid-template-columns:1fr 1fr; gap:14px; padding-top:4px;
  }
  .card{
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    border:1px solid var(--line); border-radius:var(--radius-md);
    overflow:hidden; display:flex; flex-direction:column;
    animation:fade .4s ease;
  }
  .card-media{
    position:relative; height:118px;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 120% at 70% 15%, rgba(139,238,218,0.08), transparent 60%), #081a15;
  }
  .card-media .fillet{ width:72%; height:70%; }
  .fav-btn{
    position:absolute; top:8px; right:8px; width:28px; height:28px; border-radius:50%;
    background:rgba(5,15,13,0.55); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:var(--text);
  }
  .fav-btn svg{width:14px;height:14px; transition:.2s;}
  .fav-btn.active svg{ color:#e8657a; fill:#e8657a; }
  .card-body{ padding:12px 13px 14px; display:flex; flex-direction:column; gap:3px; flex:1; }
  .card-tag{ font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--mint-dim); font-weight:800; }
  .card-name{ font-family:'Cormorant Garamond',serif; font-size:19px; color:var(--cream); font-weight:600; line-height:1.15; }
  .card-bottom{ margin-top:auto; display:flex; align-items:center; justify-content:space-between; padding-top:10px; }
  .card-price{ font-size:13px; font-weight:700; color:var(--text); }
  .card-price span{ color:var(--muted); font-weight:500; font-size:11px; }
  .add-btn{
    width:30px; height:30px; border-radius:50%; border:1px solid var(--line-strong);
    background:transparent; color:var(--mint); display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:background .2s, transform .15s;
  }
  .add-btn:active{ transform:scale(.9); }
  .add-btn svg{ width:14px;height:14px; }
  .qty-stepper{
    display:flex; align-items:center; gap:8px; background:rgba(139,238,218,0.08);
    border:1px solid var(--mint-dim); border-radius:20px; padding:3px 6px;
  }
  .qty-stepper button{ width:20px;height:20px; border:none; background:none; color:var(--mint); display:flex; align-items:center; justify-content:center; }
  .qty-stepper button svg{ width:11px;height:11px; }
  .qty-stepper .qn{ font-size:12px; font-weight:800; min-width:14px; text-align:center; }

  /* ---------- FEATURES ---------- */
  .feature-panel{
    margin:34px 20px 0; border:1px solid var(--line); border-radius:var(--radius-lg);
    background:linear-gradient(180deg, rgba(139,238,218,0.03), transparent);
    overflow:hidden;
  }
  .feature{
    display:flex; gap:14px; align-items:center; padding:18px 18px;
    border-bottom:1px solid var(--line); cursor:pointer;
  }
  .feature:last-child{ border-bottom:none; }
  .feature-icon{
    width:36px;height:36px; border-radius:50%; border:1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center; color:var(--mint); flex-shrink:0;
  }
  .feature-icon svg{ width:17px;height:17px; }
  .feature-text{ flex:1; }
  .feature-text .ft-title{ font-size:12px; letter-spacing:.1em; text-transform:uppercase; font-weight:800; color:var(--gold); margin-bottom:5px; }
  .feature-text .ft-desc{ font-size:13px; color:var(--muted); line-height:1.5; max-height:0; overflow:hidden; transition:max-height .3s ease, opacity .3s; opacity:0; }
  .feature.open .ft-desc{ max-height:90px; opacity:1; margin-top:4px; }
  .feature-chev{ width:14px;height:14px; color:var(--muted-2); transition:transform .3s; flex-shrink:0; }
  .feature.open .feature-chev{ transform:rotate(90deg); color:var(--mint); }

  /* ---------- FOOTER ---------- */
  footer{ margin-top:44px; padding:30px 20px 110px; border-top:1px solid var(--line); }
  footer .f-logo{ font-family:'Cormorant Garamond',serif; font-size:20px; letter-spacing:.22em; padding-left:.22em; color:var(--cream); margin-bottom:6px; }
  footer .f-tag{ font-size:12px; color:var(--muted); margin-bottom:22px; }
  footer .f-socials{ display:flex; gap:12px; margin-top:6px; }
  footer .f-socials a{
    width:40px;height:40px; border-radius:50%; border:1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center; color:var(--mint);
  }
  footer .f-socials svg{ width:18px;height:18px; }
  footer .copyright{ margin-top:26px; font-size:10.5px; color:var(--muted-2); letter-spacing:.05em; }

  /* ---------- STICKY CART BAR ---------- */
  .cart-bar{
    position:fixed; left:50%; transform:translateX(-50%) translateY(140%);
    bottom:16px; width:calc(100% - 40px); max-width:420px;
    background:linear-gradient(120deg, #0f2e26, #0a1e19);
    border:1px solid var(--mint-dim); border-radius:18px;
    padding:13px 16px; display:flex; align-items:center; justify-content:space-between;
    box-shadow:var(--shadow); z-index:50; transition:transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .cart-bar.show{ transform:translateX(-50%) translateY(0); }
  .cart-bar .cb-left{ display:flex; align-items:center; gap:10px; font-size:13px; }
  .cart-bar .cb-count{
    width:24px;height:24px;border-radius:50%; background:var(--mint); color:#04120e;
    font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;
  }
  .cart-bar .cb-sum{ font-weight:800; color:var(--cream); }
  .cart-bar .cb-btn{
    background:var(--mint); color:#04120e; border:none; border-radius:30px;
    padding:10px 18px; font-size:11.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
    display:flex; align-items:center; gap:6px;
  }
  .cart-bar .cb-btn svg{ width:12px;height:12px; }

  /* ---------- CART DRAWER ---------- */
  .drawer{
    position:fixed; left:0; right:0; bottom:0; z-index:80;
    background:linear-gradient(180deg, #0b201b, #04110d);
    border-top:1px solid var(--line-strong);
    border-radius:24px 24px 0 0;
    max-width:460px; margin:0 auto;
    transform:translateY(100%); transition:transform .4s cubic-bezier(.2,.8,.2,1);
    max-height:82vh; display:flex; flex-direction:column;
    box-shadow:0 -20px 60px rgba(0,0,0,0.5);
  }
  .drawer.show{ transform:translateY(0); }
  .drawer-handle{ width:36px;height:4px; background:var(--line-strong); border-radius:3px; margin:12px auto 6px; }
  .drawer-head{ display:flex; align-items:center; justify-content:space-between; padding:6px 22px 14px; border-bottom:1px solid var(--line); }
  .drawer-head h3{ font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--cream); font-weight:600; margin:0; }
  .drawer-items{ overflow-y:auto; padding:6px 22px; flex:1; }
  .drawer-empty{ padding:40px 0; text-align:center; color:var(--muted); font-size:13.5px; }
  .d-item{ display:flex; gap:12px; align-items:center; padding:14px 0; border-bottom:1px solid var(--line); }
  .d-item .fillet{ width:52px;height:52px; flex-shrink:0; box-shadow:none; }
  .d-item-info{ flex:1; min-width:0; }
  .d-item-info .n{ font-family:'Cormorant Garamond',serif; font-size:16.5px; color:var(--cream); font-weight:600; }
  .d-item-info .p{ font-size:12px; color:var(--muted); margin-top:2px; }
  .d-item .remove{ background:none; border:none; color:var(--muted-2); width:22px;height:22px; }
  .d-item .remove svg{ width:14px;height:14px; }
  .drawer-foot{ padding:16px 22px 26px; border-top:1px solid var(--line); }
  .drawer-foot .sum-row{ display:flex; justify-content:space-between; font-size:14px; color:var(--muted); margin-bottom:6px; }
  .drawer-foot .sum-row.total{ font-size:18px; color:var(--cream); font-weight:700; margin-bottom:16px; }
  .checkout-btn{
    width:100%; background:var(--mint); color:#04120e; border:none; border-radius:30px;
    padding:16px; font-size:13px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
    transition:opacity .2s;
  }
  .checkout-btn:disabled{ opacity:.55; }

  /* ---------- ORDER FORM ---------- */
  .order-form{ padding:4px 0 18px; border-top:1px solid var(--line); margin-top:4px; }
  .order-form .of-title{
    font-family:'Cormorant Garamond',serif; font-size:17px; color:var(--cream); font-weight:600;
    margin:14px 0 10px;
  }
  .of-field{ margin-bottom:10px; }
  .of-field label{
    display:block; font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--muted); font-weight:700; margin-bottom:6px;
  }
  .of-field input, .of-field textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--line-strong); border-radius:12px;
    padding:11px 13px; font-size:13.5px; color:var(--text); font-family:inherit;
  }
  .of-field input::placeholder, .of-field textarea::placeholder{ color:var(--muted-2); }
  .of-field input:focus, .of-field textarea:focus{ outline:none; border-color:var(--mint); }
  .of-field textarea{ resize:vertical; min-height:56px; }
  .of-type{ display:flex; gap:8px; }
  .of-type button{
    flex:1; padding:10px 0; border-radius:12px; border:1px solid var(--line-strong);
    background:transparent; color:var(--muted); font-size:12.5px; font-weight:700;
  }
  .of-type button.active{ background:var(--mint); color:#04120e; border-color:var(--mint); }
  .of-error{ color:#e08a7a; font-size:11.5px; margin-top:4px; display:none; }
  .of-error.show{ display:block; }

  /* ---------- TOAST ---------- */
  .toast{
    position:fixed; left:50%; top:70px; transform:translateX(-50%) translateY(-20px);
    background:var(--cream); color:#0a1e19; padding:11px 20px; border-radius:30px;
    font-size:12.5px; font-weight:700; z-index:100; opacity:0; transition:.35s;
    box-shadow:0 10px 30px rgba(0,0,0,.3); white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }
</style>
</head>
<body>
<div class="device" id="device">

  <!-- TOP NAV -->
  <div class="topnav">
    <button class="icon-btn" id="menuBtn" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div class="logo">
      <svg viewBox="0 0 100 20" fill="none"><path d="M2 12c6-8 10 8 16 0s10 8 16 0 10 8 16 0 10 8 16 0 10 8 16 0" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <div class="word">SEAFOODS</div>
      <div class="sub">PREMIUM FISH</div>
    </div>
    <button class="icon-btn" id="cartBtn" aria-label="Cart">
      <svg viewBox="0 0 24 24" fill="none" width="21" height="21"><path d="M6 8h12l-1 12H7L6 8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M9 8V6a3 3 0 0 1 6 0v2" stroke="currentColor" stroke-width="1.6"/></svg>
      <span class="cart-badge" id="cartBadge">0</span>

        p9:{name:'Uova di salmone', tag:'Prelibatezze'}
      }
    }
  };

  const LANGS = ['az','ru','en','it'];
  let lang = 'az';
  function t(path){
    return path.split('.').reduce((o,k)=> (o == null ? o : o[k]), I18N[lang]);
  }

  // ---------------- DATA (language-independent) ----------------
  const CAT_IDS = ['all','tuna','salmon','white','seafood','delicacy'];
  const PRODUCTS = [
    {id:'p1', cat:'tuna', price:145, unit:'kg', grad:['var(--tuna1)','var(--tuna2)']},
    {id:'p2', cat:'tuna', price:78, unit:'kg', grad:['var(--tuna1)','var(--tuna2)']},
    {id:'p3', cat:'salmon', price:62, unit:'kg', grad:['var(--salmon1)','var(--salmon2)']},
    {id:'p4', cat:'salmon', price:48, unit:'kg', grad:['var(--salmon1)','var(--salmon2)']},
    {id:'p5', cat:'white', price:85, unit:'kg', grad:['var(--white1)','var(--white2)']},
    {id:'p6', cat:'white', price:42, unit:'kg', grad:['var(--white1)','var(--white2)']},
    {id:'p7', cat:'seafood', price:52, unit:'kg', grad:['var(--scallop1)','var(--scallop2)']},
    {id:'p8', cat:'delicacy', price:110, unit:'kg', grad:['var(--crab1)','var(--crab2)']},
    {id:'p9', cat:'delicacy', price:58, unit:'100g', grad:['var(--caviar1)','var(--caviar2)']},
  ];

  let activeCat = 'all';
  let showAll = false;
  const VISIBLE_LIMIT = 4;
  const cart = {}; // id -> qty
  const favs = new Set();

  // ---------------- TELEGRAM CONFIG ----------------
  const TG_BOT_TOKEN = '8882645401:AAHZfcHZn6BVkaSfKDK7ns48u0XL4j-MsIo';
  const TG_CHAT_ID = '8758432681';
  let orderType = 'once'; // 'once' | 'regular'

  const $ = (sel, root=document) => root.querySelector(sel);
  const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

  function fmtPrice(n){
    return n.toLocaleString('en-US') + ' AZN';
  }

  // ---------------- LANGUAGE SWITCHER ----------------
  const langRow = $('#langRow');
  LANGS.forEach(code => {
    const b = document.createElement('button');
    b.className = 'lang-btn' + (code === lang ? ' active' : '');
    b.textContent = code.toUpperCase();
    b.dataset.lang = code;
    b.addEventListener('click', () => setLang(code));
    langRow.appendChild(b);
  });
  function setLang(code){
    lang = code;
    $$('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === code));
    document.getElementById('htmlRoot').setAttribute('lang', code);
    applyStaticText();
    renderCategories();
    renderGrid();
    updateCartUI();
  }

  // ---------------- STATIC TEXT ----------------
  function applyStaticText(){
    $$('[data-i18n]').forEach(el => {
      const val = t(el.getAttribute('data-i18n'));
      if (typeof val === 'string') el.textContent = val;
    });
    $('#catalogTitle').textContent = activeCat === 'all' ? t('sections.popular') : t('categories.' + activeCat);
    $('#cbLabel').textContent = t('cart.items');
    $('#cbBtnLabel').textContent = t('cart.cartBtn');
    $('#drawerTitleText').textContent = t('cart.drawerTitle');
    $('#deliveryLabel').textContent = t('cart.delivery');
    $('#deliveryFee').textContent = t('cart.free');
    $('#totalLabel').textContent = t('cart.total');
    $('#checkoutBtn').textContent = t('cart.checkout');
    seeAllBtn.innerHTML = (showAll ? t('sections.hide') : t('sections.seeAll')) +
      ' <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    const of = t('orderForm');
    $('#ofTitle').textContent = of.title;
    $('#ofLabelBusiness').textContent = of.business;
    $('#ofBusiness').placeholder = of.businessPh;
    $('#ofLabelContact').textContent = of.contact;
    $('#ofContact').placeholder = of.contactPh;
    $('#ofLabelPhone').textContent = of.phone;
    $('#ofPhone').placeholder = of.phonePh;
    $('#ofLabelAddress').textContent = of.address;
    $('#ofAddress').placeholder = of.addressPh;
    $('#ofLabelType').textContent = of.type;
    $('#ofTypeOnce').textContent = of.once;
    $('#ofTypeRegular').textContent = of.regular;
    $('#ofLabelComment').textContent = of.comment;
    $('#ofComment').placeholder = of.commentPh;
  }

  // ---------------- CATEGORIES ----------------
  const catRow = $('#catRow');
  function renderCategories(){
    catRow.innerHTML = '';
    CAT_IDS.forEach(id => {
      const btn = document.createElement('button');
      btn.className = 'cat-item' + (id === activeCat ? ' active' : '');
      btn.dataset.cat = id;
      const sample = PRODUCTS.find(p => p.cat === id) || {grad:['var(--mint)','var(--mint-dim)']};
      btn.innerHTML = `<div class="cat-circle"><div class="fillet" style="background:linear-gradient(135deg, ${sample.grad[0]}, ${sample.grad[1]})"></div></div><span>${t('categories.' + id)}</span>`;
      btn.addEventListener('click', () => {
        activeCat = id;
        showAll = false;
        $$('.cat-item').forEach(el => el.classList.toggle('active', el.dataset.cat === id));
        $('#catalogTitle').textContent = id === 'all' ? t('sections.popular') : t('categories.' + id);
        renderGrid();
      });
      catRow.appendChild(btn);
    });
  }

  // ---------------- PRODUCT GRID ----------------
  const grid = $('#productGrid');
  const seeAllBtn = $('#seeAllBtn');

  function filteredProducts(){
    return activeCat === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.cat === activeCat);
  }

  function renderGrid(){
    const list = filteredProducts();
    const visible = showAll ? list : list.slice(0, VISIBLE_LIMIT);
    grid.innerHTML = '';
    visible.forEach(p => grid.appendChild(renderCard(p)));
    seeAllBtn.style.display = list.length > VISIBLE_LIMIT ? 'flex' : 'none';
    seeAllBtn.innerHTML = (showAll ? t('sections.hide') : t('sections.seeAll')) +
      ' <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  function renderCard(p){
    const info = t('products.' + p.id);
    const card = document.createElement('div');
    card.className = 'card';
    const qty = cart[p.id] || 0;
    card.innerHTML = `
      <div class="card-media">
        <button class="fav-btn ${favs.has(p.id) ? 'active' : ''}" data-fav="${p.id}">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 20s-7-4.4-9.3-8.8C1.2 8 2.6 4.8 5.7 4.1 8 3.6 10 4.7 12 7c2-2.3 4-3.4 6.3-2.9 3.1.7 4.5 3.9 3 7.1C19 15.6 12 20 12 20Z" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <div class="fillet" style="background:linear-gradient(135deg, ${p.grad[0]}, ${p.grad[1]})"></div>
      </div>
      <div class="card-body">
        <div class="card-tag">${info.tag}</div>
        <div class="card-name">${info.name}</div>
        <div class="card-bottom">
          <div class="card-price">${fmtPrice(p.price)} <span>/ ${p.unit}</span></div>
          <div class="stepper-slot" data-slot="${p.id}"></div>
        </div>
      </div>
    `;
    renderStepper(card.querySelector(`[data-slot="${p.id}"]`), p, qty);
    card.querySelector(`[data-fav="${p.id}"]`).addEventListener('click', (e) => {
      e.stopPropagation();
      if (favs.has(p.id)) favs.delete(p.id); else favs.add(p.id);
      card.querySelector(`[data-fav="${p.id}"]`).classList.toggle('active');
    });
    return card;
  }

  function renderStepper(slot, p, qty){
    if (qty <= 0){
      slot.innerHTML = `<button class="add-btn" data-add="${p.id}"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>`;
      slot.querySelector('[data-add]').addEventListener('click', () => changeQty(p, 1, slot));
    } else {
      slot.innerHTML = `
        <div class="qty-stepper">
          <button data-dec><svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
          <span class="qn">${qty}</span>
          <button data-inc><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
        </div>`;
      slot.querySelector('[data-inc]').addEventListener('click', () => changeQty(p, 1, slot));
      slot.querySelector('[data-dec]').addEventListener('click', () => changeQty(p, -1, slot));
    }
  }

  function changeQty(p, delta, slot){
    const cur = cart[p.id] || 0;
    const next = Math.max(0, cur + delta);
    if (next === 0) delete cart[p.id]; else cart[p.id] = next;
    renderStepper(slot, p, next);
    updateCartUI();
    if (delta > 0) showToast(t('toast').added(t('products.' + p.id).name));
    pulseBadge();
  }

  // ---------------- HERO SLIDER ----------------
  const slides = $$('.hero-slide');
  const dotsWrap = $('#heroDots');
  let heroIdx = 0;
  slides.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => setHero(i));
    dotsWrap.appendChild(d);
  });
  function setHero(i){
    heroIdx = i;
    slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
    $$('.dot', dotsWrap).forEach((d, idx) => d.classList.toggle('active', idx === i));
  }
  let heroTimer = setInterval(() => setHero((heroIdx + 1) % slides.length), 5500);
  $('#heroSlider').addEventListener('touchstart', () => clearInterval(heroTimer), {passive:true});

  let touchX = null;
  const heroEl = $('#heroSlider');
  heroEl.addEventListener('touchstart', e => touchX = e.touches[0].clientX, {passive:true});
  heroEl.addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40){
      if (dx < 0) setHero((heroIdx + 1) % slides.length);
      else setHero((heroIdx - 1 + slides.length) % slides.length);
    }
    touchX = null;
  }, {passive:true});

  // ---------------- SIDE MENU ----------------
  const overlay = $('#overlay');
  const sideMenu = $('#sideMenu');
  function openMenu(){ sideMenu.classList.add('show'); overlay.classList.add('show'); }
  function closeMenu(){ sideMenu.classList.remove('show'); overlay.classList.remove('show'); }
  $('#menuBtn').addEventListener('click', openMenu);
  $('#closeMenuBtn').addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);

  $$('.menu-link').forEach(a => a.addEventListener('click', (e) => {
    e.preventDefault();
    const targetId = a.dataset.target;
    closeMenu();
    setTimeout(() => {
      const el = document.getElementById(targetId);
      if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 320);
  }));

  // ---------------- FEATURES ACCORDION ----------------
  $$('.feature').forEach(f => {
    f.addEventListener('click', () => {
      const wasOpen = f.classList.contains('open');
      $$('.feature').forEach(el => el.classList.remove('open'));
      if (!wasOpen) f.classList.add('open');
    });
  });

  // ---------------- CART / DRAWER ----------------
  const cartBar = $('#cartBar');
  const cartBadge = $('#cartBadge');
  const cbCount = $('#cbCount');
  const cbSum = $('#cbSum');
  const drawer = $('#drawer');
  const drawerOverlay = $('#drawerOverlay');
  const drawerItems = $('#drawerItems');
  const drawerTotal = $('#drawerTotal');

  function cartEntries(){
    return Object.entries(cart).map(([id, qty]) => ({p: PRODUCTS.find(pp => pp.id === id), qty}));
  }
  function cartTotal(){
    return cartEntries().reduce((sum, e) => sum + e.p.price * e.qty, 0);
  }
  function cartCount(){
    return Object.values(cart).reduce((a,b) => a+b, 0);
  }

  function updateCartUI(){
    const count = cartCount();
    const total = cartTotal();
    cartBadge.textContent = count;
    cbCount.textContent = count;
    cbSum.textContent = fmtPrice(total);
    drawerTotal.textContent = fmtPrice(total);
    cartBar.classList.toggle('show', count > 0);
    renderDrawerItems();
  }

  function renderDrawerItems(){
    const entries = cartEntries();
    if (entries.length === 0){
      drawerItems.innerHTML = `<div class="drawer-empty">${t('cart.empty')}</div>`;
      return;
    }
    drawerItems.innerHTML = '';
    entries.forEach(({p, qty}) => {
      const info = t('products.' + p.id);
      const row = document.createElement('div');
      row.className = 'd-item';
      row.innerHTML = `
        <div class="fillet" style="background:linear-gradient(135deg, ${p.grad[0]}, ${p.grad[1]})"></div>
        <div class="d-item-info">
          <div class="n">${info.name}</div>
          <div class="p">${qty} × ${fmtPrice(p.price)} / ${p.unit}</div>
        </div>
        <button class="remove" data-remove="${p.id}"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
      `;
      row.querySelector('[data-remove]').addEventListener('click', () => {
        delete cart[p.id];
        updateCartUI();
        renderGrid();
      });
      drawerItems.appendChild(row);
    });
  }

  function pulseBadge(){
    cartBadge.classList.remove('pulse');
    void cartBadge.offsetWidth;
    cartBadge.classList.add('pulse');
  }

  function openDrawer(){ drawer.classList.add('show'); drawerOverlay.classList.add('show'); }
  function closeDrawer(){ drawer.classList.remove('show'); drawerOverlay.classList.remove('show'); }
  $('#cartBtn').addEventListener('click', openDrawer);
  $('#openDrawerBtn').addEventListener('click', openDrawer);
  $('#closeDrawerBtn').addEventListener('click', closeDrawer);
  drawerOverlay.addEventListener('click', closeDrawer);
  const ofTypeOnce = $('#ofTypeOnce');
  const ofTypeRegular = $('#ofTypeRegular');
  ofTypeOnce.addEventListener('click', () => {
    orderType = 'once';
    ofTypeOnce.classList.add('active');
    ofTypeRegular.classList.remove('active');
  });
  ofTypeRegular.addEventListener('click', () => {
    orderType = 'regular';
    ofTypeRegular.classList.add('active');
    ofTypeOnce.classList.remove('active');
  });

  const ofError = $('#ofError');
  const checkoutBtn = $('#checkoutBtn');

  function escapeHtml(str){
    return String(str).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  }

  function buildOrderMessage(fields){
    const lines = [];
    lines.push('🐟 <b>Yeni sifariş / Новый заказ</b>');
    lines.push('');
    lines.push(`<b>Müəssisə/Заведение:</b> ${escapeHtml(fields.business)}`);
    lines.push(`<b>Əlaqə/Контакт:</b> ${escapeHtml(fields.contact)}`);
    lines.push(`<b>Telefon/Телефон:</b> ${escapeHtml(fields.phone)}`);
    lines.push(`<b>Ünvan/Адрес:</b> ${escapeHtml(fields.address)}`);
    lines.push(`<b>Növ/Тип:</b> ${orderType === 'regular' ? (t('orderForm').regular) : (t('orderForm').once)}`);
    if (fields.comment) lines.push(`<b>Şərh/Комментарий:</b> ${escapeHtml(fields.comment)}`);
    lines.push('');
    lines.push('<b>Sifariş/Заказ:</b>');
    cartEntries().forEach(({p, qty}) => {
      const info = t('products.' + p.id);
      lines.push(`• ${escapeHtml(info.name)} — ${qty} × ${fmtPrice(p.price)}`);
    });
    lines.push('');
    lines.push(`<b>Cəmi/Итого:</b> ${fmtPrice(cartTotal())}`);
    return lines.join('\n');
  }

  async function sendOrderToTelegram(text){
    const url = `https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`;
    const params = new URLSearchParams();
    params.set('chat_id', TG_CHAT_ID);
    params.set('text', text);
    params.set('parse_mode', 'HTML');
    const res = await fetch(url, {
      method: 'POST',
      body: params
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.description || 'Telegram error');
    return data;
  }

  checkoutBtn.addEventListener('click', async () => {
    if (cartCount() === 0) return;
    ofError.classList.remove('show');

    const fields = {
      business: $('#ofBusiness').value.trim(),
      contact: $('#ofContact').value.trim(),
      phone: $('#ofPhone').value.trim(),
      address: $('#ofAddress').value.trim(),
      comment: $('#ofComment').value.trim()
    };

    if (!fields.business || !fields.contact || !fields.phone || !fields.address){
      ofError.textContent = t('orderForm').errRequired;
      ofError.classList.add('show');
      return;
    }

    const originalLabel = checkoutBtn.textContent;
    checkoutBtn.disabled = true;
    checkoutBtn.textContent = t('orderForm').sending;

    try {
      await sendOrderToTelegram(buildOrderMessage(fields));
      showToast(t('toast').orderPlaced);
      Object.keys(cart).forEach(k => delete cart[k]);
      ['ofBusiness','ofContact','ofPhone','ofAddress','ofComment'].forEach(id => $('#'+id).value = '');
      orderType = 'once';
      ofTypeOnce.classList.add('active');
      ofTypeRegular.classList.remove('active');
      updateCartUI();
      renderGrid();
      closeDrawer();
    } catch (err){
      console.error('Telegram send failed:', err);
      ofError.textContent = t('orderForm').sendError;
      ofError.classList.add('show');
    } finally {
      checkoutBtn.disabled = false;
      checkoutBtn.textContent = originalLabel;
    }
  });

  // ---------------- SEE ALL ----------------
  seeAllBtn.addEventListener('click', () => { showAll = !showAll; renderGrid(); });

  // ---------------- TOAST ----------------
  let toastTimer;
  function showToast(msg){
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ---------------- INIT ----------------
  applyStaticText();
  renderCategories();
  renderGrid();
  updateCartUI();
})();
</script>
</body>
</html>
